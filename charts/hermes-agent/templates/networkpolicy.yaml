{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "hermes-agent.fullname" . }}
  labels:
    {{- include "hermes-agent.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "hermes-agent.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
{{- if .Values.networkPolicy.ingress }}
{{ toYaml .Values.networkPolicy.ingress | indent 4 }}
{{- else }}
    []
{{- end }}
  egress:
{{- if or .Values.networkPolicy.allowDNS .Values.networkPolicy.egress }}
  {{- if .Values.networkPolicy.allowDNS }}
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
  {{- end }}
  {{- with .Values.networkPolicy.egress }}
{{ toYaml . | indent 4 }}
  {{- end }}
{{- else }}
    []
{{- end }}
{{- end }}
