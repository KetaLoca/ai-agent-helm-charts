{{- if .Values.service.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hermes-agent.fullname" . }}
  labels:
    {{- include "hermes-agent.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "hermes-agent.selectorLabels" . | nindent 4 }}
  ports:
    - name: gateway
      port: {{ .Values.service.port }}
      targetPort: gateway
      protocol: TCP
    {{- if and .Values.dashboard.enabled .Values.dashboard.service }}
    - name: dashboard
      port: {{ .Values.dashboard.port }}
      targetPort: dashboard
      protocol: TCP
    {{- end }}
{{- end }}
