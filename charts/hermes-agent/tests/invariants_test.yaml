suite: invariants
templates:
  - templates/deployment.yaml
release:
  name: rel
tests:
  - it: rejects persistence with replicaCount > 1
    set:
      persistence.enabled: true
      replicaCount: 2
    asserts:
      - failedTemplate: {}

  - it: rejects ingress enabled without hosts
    set:
      ingress.enabled: true
    asserts:
      - failedTemplate: {}

  - it: rejects an insecure dashboard without acknowledgement
    set:
      dashboard.enabled: true
      dashboard.insecure: true
    asserts:
      - failedTemplate: {}

  - it: rejects RollingUpdate with persistence
    set:
      persistence.enabled: true
      strategy.type: RollingUpdate
    asserts:
      - failedTemplate: {}

  # NOTE: the "all-empty image reference" guard (digest + tag + appVersion all empty
  # => fail, no silent :latest) lives in templates/_helpers.tpl. It is intentionally
  # NOT unit-tested here: helm-unittest ignores an empty `chart.appVersion` override,
  # and this chart always sets appVersion, so the branch is unreachable in a unit
  # test. Positive image-resolution paths are covered in deployment_test.yaml.
