{{- include "openclaw-instance.validate" . -}}
apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: {{ include "openclaw-instance.instanceName" . }}
  labels:
    {{- include "openclaw-instance.labels" . | nindent 4 }}
    {{- with .Values.instance.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- if or .Values.operator.install .Values.instance.annotations }}
  annotations:
    {{- if .Values.operator.install }}
    # All-in-one: the operator + its CRDs are installed in this same release, so the
    # CRD does not exist yet when Helm validates the main manifest. Apply the CR as a
    # post-install/upgrade hook so it lands AFTER the CRDs (and operator) are created.
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    {{- end }}
    {{- with .Values.instance.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  {{- $modeled := include "openclaw-instance.modeledSpec" . | fromYaml }}
  {{- $spec := mergeOverwrite $modeled (deepCopy .Values.extraSpec) }}
  {{- $spec | toYaml | nindent 2 }}
