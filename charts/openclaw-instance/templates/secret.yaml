{{- if .Values.secrets.create -}}
{{- /* DEV ONLY: this writes secret values into the release. Use existingSecret / External Secrets in production. */ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openclaw-instance.secretName" . }}
  labels:
    {{- include "openclaw-instance.labels" . | nindent 4 }}
type: Opaque
{{- with .Values.secrets.data }}
stringData:
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- end }}
