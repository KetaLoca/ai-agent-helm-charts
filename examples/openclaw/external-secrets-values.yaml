# Provider keys supplied from outside Git. External Secrets Operator / Sealed Secrets
# / SOPS produce a Secret; reference it here. See docs/external-secrets.md.

secrets:
  # The Secret must contain the provider keys the agent needs (e.g. ANTHROPIC_API_KEY).
  existingSecret: openclaw-keys

# Or wire several managed secrets directly into the CR's envFrom:
# envFrom:
#   - secretRef:
#       name: openclaw-provider-keys
#   - secretRef:
#       name: openclaw-extra-keys
