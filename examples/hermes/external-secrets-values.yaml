# Secrets supplied from outside Git. Two common patterns:
#
# A) External Secrets Operator / Sealed Secrets produce a normal Secret named
#    "hermes-secrets" containing API_SERVER_KEY (+ provider keys). Reference it:
secrets:
  existingSecret: hermes-secrets

apiServer:
  requireKey: true
  key: ""   # never inline in production

# B) Or wire arbitrary envFrom sources (e.g. multiple managed Secrets):
# extraEnvFrom:
#   - secretRef:
#       name: hermes-gateway-key      # has API_SERVER_KEY
#   - secretRef:
#       name: llm-provider-keys       # has ANTHROPIC_API_KEY / OPENAI_API_KEY
#
# See docs/external-secrets.md for full ExternalSecret / SealedSecret / SOPS recipes.
