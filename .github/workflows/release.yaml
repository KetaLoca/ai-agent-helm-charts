name: release

# Publishes on push to main whenever a chart's Chart.yaml `version` is bumped:
# chart-releaser only packages versions that don't have a Release yet, so a push that
# doesn't bump any chart version publishes nothing (the downstream steps are all
# guarded on the produced packages). Still runnable manually from the Actions tab
# ("release" -> "Run workflow"). See docs/releasing.md for one-time setup (gh-pages,
# public packages, Artifact Hub).
on:
  push:
    branches: [main]
    paths:
      - 'charts/**'
  workflow_dispatch: {}

permissions:
  contents: write       # create GitHub Releases + push to the gh-pages branch
  packages: write       # push OCI charts to GHCR
  id-token: write       # cosign keyless signing (OIDC)
  attestations: write   # SLSA build provenance attestations

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      # Resolve subchart dependencies (e.g. openclaw-instance's optional
      # openclaw-operator) so chart-releaser packages them into the chart archive.
      - name: Build chart dependencies
        run: |
          set -euo pipefail
          for chart in charts/*/; do
            if grep -q '^dependencies:' "${chart}Chart.yaml"; then
              echo "== helm dependency update ${chart} =="
              helm dependency update "${chart}"
            fi
          done

      # Classic channel: packages changed charts, creates GitHub Releases, and
      # updates index.yaml on the gh-pages branch (which must already exist).
      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: charts
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          CR_SKIP_EXISTING: "true"

      # OCI channel: push the same freshly-packaged charts to GHCR.
      - name: Push new charts to GHCR (OCI)
        run: |
          set -euo pipefail
          shopt -s nullglob
          pkgs=(.cr-release-packages/*.tgz)
          if [ ${#pkgs[@]} -eq 0 ]; then
            echo "No new chart versions to push."
            exit 0
          fi
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          for p in "${pkgs[@]}"; do
            echo "Pushing ${p} -> oci://ghcr.io/ketaloca/charts"
            helm push "${p}" oci://ghcr.io/ketaloca/charts
          done

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign published charts (keyless OIDC)
        run: |
          set -euo pipefail
          shopt -s nullglob
          pkgs=(.cr-release-packages/*.tgz)
          if [ ${#pkgs[@]} -eq 0 ]; then echo "Nothing to sign."; exit 0; fi
          # cosign needs its own registry auth to PUSH the signature (helm's login
          # doesn't populate the docker config cosign reads).
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          for p in "${pkgs[@]}"; do
            base="$(basename "${p}" .tgz)"   # <chart>-<version>
            name="${base%-*}"; ver="${base##*-}"
            echo "Signing ghcr.io/ketaloca/charts/${name}:${ver}"
            cosign sign --yes "ghcr.io/ketaloca/charts/${name}:${ver}"
          done

      # Guard the attestation: attest-build-provenance fails when no subject matches,
      # which would break every push that doesn't publish a new chart version.
      - name: Detect packaged charts
        id: pkgs
        run: |
          shopt -s nullglob
          pkgs=(.cr-release-packages/*.tgz)
          echo "count=${#pkgs[@]}" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance for the chart packages
        if: steps.pkgs.outputs.count != '0'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ".cr-release-packages/*.tgz"
