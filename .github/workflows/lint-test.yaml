name: lint-test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: lint-test-${{ github.ref }}
  cancel-in-progress: true

env:
  HELM_VERSION: "v3.16.4"
  KUBECONFORM_VERSION: "0.6.7"
  HELM_UNITTEST_VERSION: "v0.7.2"

jobs:
  lint-render-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yamllint
        run: pip install "yamllint==1.35.1"

      - name: Install kubeconform
        run: |
          set -euo pipefail
          curl -sSLo /tmp/kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp kubeconform
          sudo mv /tmp/kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Install helm-unittest plugin
        run: |
          helm plugin install https://github.com/helm-unittest/helm-unittest --version "${HELM_UNITTEST_VERSION}" \
            || helm plugin install https://github.com/helm-unittest/helm-unittest

      - name: yamllint
        run: yamllint -c .yamllint.yaml charts examples .github

      - name: helm lint (strict)
        run: |
          set -euo pipefail
          for chart in charts/*/; do
            echo "== helm lint ${chart} =="
            helm lint "${chart}" --strict
          done

      - name: Render defaults + every example
        run: |
          set -euo pipefail
          for chart in charts/*/; do
            echo "== render $(basename "${chart}") (defaults) =="
            helm template rel "${chart}" >/dev/null
          done
          for f in examples/hermes/*.yaml; do
            echo "== render hermes-agent -f ${f} =="
            helm template rel charts/hermes-agent -f "${f}" >/dev/null
          done

      - name: kubeconform (Kubernetes version matrix)
        run: |
          set -euo pipefail
          for kver in 1.25.16 1.28.15 1.31.2; do
            echo "== kubeconform k8s ${kver} =="
            helm template rel charts/hermes-agent \
              | kubeconform -strict -summary -ignore-missing-schemas \
                  -kubernetes-version "${kver}" \
                  -schema-location default
          done

      - name: helm-unittest
        run: |
          set -euo pipefail
          for chart in charts/*/; do
            if [ -d "${chart}tests" ]; then
              echo "== helm unittest ${chart} =="
              helm unittest "${chart}"
            fi
          done

      - name: Negative value tests (must be rejected)
        run: bash .github/scripts/negative-tests.sh
